<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>US Market Agent 🇺🇸</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap');
    * { font-family: 'Noto Sans KR', sans-serif; }
    .mono { font-family: 'JetBrains Mono', monospace; }
    body { background: #04091a; color: #e2e8f0; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0d1a2e; }
    ::-webkit-scrollbar-thumb { background: #1e3a5f; border-radius: 3px; }
    .glow-buy  { box-shadow: 0 0 24px rgba(34,197,94,0.3); }
    .glow-sell { box-shadow: 0 0 24px rgba(239,68,68,0.3); }
    .glow-hold { box-shadow: 0 0 24px rgba(234,179,8,0.3); }
    .bubble-left  { border-radius: 4px 18px 18px 18px; }
    .bubble-right { border-radius: 18px 4px 18px 18px; }
    @keyframes pulse-slow { 0%,100%{opacity:1} 50%{opacity:.6} }
    .pulse-slow { animation: pulse-slow 3s infinite; }
    .card-bg { background: linear-gradient(135deg, #0d1a2e 0%, #061122 100%); }
    .tag-buy  { background:rgba(34,197,94,.15); color:#4ade80; border:1px solid rgba(34,197,94,.3); }
    .tag-sell { background:rgba(239,68,68,.15); color:#f87171; border:1px solid rgba(239,68,68,.3); }
    .tag-hold { background:rgba(234,179,8,.15);  color:#facc15; border:1px solid rgba(234,179,8,.3); }
    .progress-bar { transition: width 1s ease-in-out; }
    .us-flag-gradient { background: linear-gradient(135deg, #04091a 0%, #0a1e3d 50%, #04091a 100%); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    // ─── 샘플 데이터 ─────────────────────────────────────────────────────────
    const SAMPLE = {
      date: "2026-03-01",
      generated_at: "2026-03-01T08:30:00",
      market_data: {
        sp500:  { close: 5814.0,  change: 31.2, change_pct: 0.54, volume_change_pct: 8.2 },
        nasdaq: { close: 18420.5, change: 168.4, change_pct: 0.92 },
        djia:   { close: 43200.1, change: -42.3, change_pct: -0.10 },
        vix:    { close: 15.8,    change: -0.6,  change_pct: -3.66 },
        dxy:    { close: 103.5,   change_pct: -0.21 },
        rates: { us10y: 4.32, us2y: 4.78, yield_spread: -0.46 },
        sectors: {
          "XLK (Tech)":           { change_pct:  1.48 },
          "XLF (Financials)":     { change_pct:  0.72 },
          "XLE (Energy)":         { change_pct: -0.83 },
          "XLV (Healthcare)":     { change_pct:  0.31 },
          "XLI (Industrials)":    { change_pct:  0.19 },
          "XLP (Staples)":        { change_pct: -0.14 },
          "XLY (Discretionary)":  { change_pct:  1.12 },
          "XLU (Utilities)":      { change_pct: -0.55 },
          "XLRE (Real Estate)":   { change_pct: -0.38 },
        },
        technical_indicators: { rsi: 61.3, macd: 24.8, signal: 18.2, histogram: 6.6, bb_position: 0.72, ma5: 5792, ma20: 5740, ma60: 5650 },
        valuation: { sp500_forward_pe: 21.4, shiller_cape: null },
        fed_watch: { hold_prob: 58, cut_prob: 38, hike_prob: 4 },
        top_stocks: [
          { name: "Apple",       ticker: "AAPL",  close: 224.5,  change_pct:  0.8 },
          { name: "Microsoft",   ticker: "MSFT",  close: 415.3,  change_pct:  1.2 },
          { name: "NVIDIA",      ticker: "NVDA",  close: 878.4,  change_pct:  3.1 },
          { name: "Amazon",      ticker: "AMZN",  close: 199.8,  change_pct:  0.4 },
          { name: "Alphabet",    ticker: "GOOGL", close: 175.2,  change_pct:  0.6 },
          { name: "Meta",        ticker: "META",  close: 591.7,  change_pct:  1.8 },
          { name: "Tesla",       ticker: "TSLA",  close: 284.3,  change_pct: -1.4 },
          { name: "JPMorgan",    ticker: "JPM",   close: 234.1,  change_pct:  0.7 },
        ],
      },
      debate: {
        phase1_reports: [
          { agent_name:"TechMo", role:"기술적 모멘텀 분석가", avatar:"📊", stance:"BUY", confidence_score:76,
            analysis:"S&P500 RSI 61.3으로 강세 모멘텀 구간에서 과매수 경고 없이 상승 중입니다. MACD 히스토그램 +6.6으로 강화되고 있으며, 볼린저밴드 상단 72% 위치는 추가 상승 여력이 존재함을 시사합니다. VIX 15.8로 공포지수가 낮고 시장 심리가 안정적입니다. 5일 이평선이 20일 이평선을 상회 유지하며 정배열 상태입니다. 나스닥 +0.92% 주도로 기술주 모멘텀이 시장을 이끌고 있어 단기 매수 관점 유지.",
            key_points:["RSI 61.3 — 강세 구간, VIX 15.8 저위험","MACD 히스토그램 +6.6 강화, 골든크로스 유지","볼린저밴드 72% — 추가 상승 여력 충분"] },
          { agent_name:"MacroFed", role:"거시경제·Fed 정책 분석가", avatar:"🏛️", stance:"HOLD", confidence_score:64,
            analysis:"미 10년물 4.32%, 2년물 4.78%로 장단기 금리차 -0.46%포인트의 역전 상태가 지속되고 있습니다. 이는 경기 침체 선행 신호로 역사적으로 12~18개월 내 경기 수축과 연계됩니다. CME FedWatch는 동결 58%, 인하 38%로 시장이 6월 인하를 기대하고 있으나 1월 CPI 데이터가 예상 상회 시 이 기대가 후퇴할 위험이 있습니다. DXY 103.5로 달러 강세가 다국적 기업 실적에 역풍입니다.",
            key_points:["장단기 스프레드 -0.46% 역전 — 경기 침체 선행 신호","Fed 인하 기대 38% — CPI 오버슈팅 시 기대 후퇴 위험","DXY 103.5 달러 강세 — 수출 기업 실적 압박"] },
          { agent_name:"SectorRot", role:"섹터 로테이션·자금 흐름 분석가", avatar:"🔄", stance:"BUY", confidence_score:79,
            analysis:"XLK(Tech) +1.48%, XLY(Discretionary) +1.12%로 Risk-on 섹터가 오늘 시장을 주도하고 있습니다. 반면 방어주인 XLU(Utilities) -0.55%, XLP(Staples) -0.14%의 약세는 투자자들이 경기 민감 섹터로 자금을 이동 중임을 시사합니다. AI·반도체 수요 확대로 XLK로의 구조적 자금 유입이 지속되고 있으며, NVDA +3.1%가 기술 섹터 전체를 견인하고 있습니다. 섹터 로테이션 관점에서 현재 Risk-on 모드 진행 중.",
            key_points:["XLK +1.48%, XLY +1.12% — Risk-on 섹터 주도","방어주 XLU·XLP 약세 — 위험자산 선호 확인","NVDA +3.1% 기술 섹터 견인, AI 수요 모멘텀 지속"] },
          { agent_name:"ValueFund", role:"가치투자·펀더멘털 분석가", avatar:"📈", stance:"HOLD", confidence_score:58,
            analysis:"S&P500 Forward P/E 21.4배로 역사적 평균(16-17배) 대비 25% 이상 고평가 상태입니다. AI 기대감이 프리미엄을 정당화하는 측면이 있으나 Mag7 평균 PER이 30배 이상으로 실적 성장이 기대에 못 미칠 경우 밸류 수축 위험이 큽니다. TSLA -1.4%, Tesla의 가이던스 하향이 성장주 전반의 밸류에이션 재검토를 촉발할 수 있습니다. 4.32% 금리 환경에서 P/E 21배는 역사적으로 향후 10년 수익률이 낮았던 구간입니다.",
            key_points:["Forward P/E 21.4배 — 역사적 25% 고평가","4.32% 금리 환경에서 고밸류 유지 위험","Mag7 실적 가이던스 하향 리스크 주의"] },
        ],
        phase2_critiques: [
          { from_agent:"TechMo",    to_agent:"ValueFund", critique:"P/E 고평가 논거는 금리인하 사이클 직전의 밸류 확장을 간과합니다. 현재 RSI·MACD는 모멘텀이 살아있음을 수치로 증명하고 있습니다. 기술 혁명기에는 전통적 P/E 기준이 무력화되는 경향이 있으며, AI 수익화 가속화 시 현재 밸류에이션이 오히려 저평가로 재해석될 수 있습니다." },
          { from_agent:"MacroFed",  to_agent:"SectorRot", critique:"Risk-on 섹터 주도는 단기 포지션 플레이일 수 있습니다. 장단기 금리 역전 -0.46%는 6개월~1년 내 경기 둔화를 선행 예고하며, 이 환경에서 Tech·Discretionary 비중을 늘리는 것은 주의가 필요합니다. Fed 인하 지연 시나리오에서 현재 Risk-on 흐름이 급반전될 위험을 섹터 분석이 충분히 반영하지 않았습니다." },
          { from_agent:"SectorRot", to_agent:"MacroFed",  critique:"금리 역전은 이미 2022년부터 지속됐고 시장은 그 기간에도 상승했습니다. 역전 상태에서 경기침체까지 18개월 이상 걸리는 경우가 많으며, 현재 AI 산업의 설비투자 사이클이 경기 하강을 상쇄하고 있습니다. XLK로의 구조적 자금 유입은 단기 모멘텀이 아닌 AI 인프라 투자 장기 사이클을 반영합니다." },
          { from_agent:"ValueFund", to_agent:"TechMo",    critique:"RSI·MACD가 강세를 가리켜도 내재가치 이상의 가격에서 매수하는 것은 위험합니다. 2000년 닷컴버블 당시에도 기술적 지표는 긍정적이었으나 밸류에이션 붕괴가 뒤따랐습니다. NVDA의 P/E 50배 이상 환경에서 모멘텀 추종은 AI 실적 가이던스 미스 시 급락 위험을 내포합니다." },
        ],
      },
      verdict: {
        final_stance: "BUY",
        confidence_score: 67,
        summary: "기술적 모멘텀과 섹터 자금 흐름이 강한 단기 상승 신호를 보내고 있으며 VIX가 낮아 시장 심리가 안정적입니다. 장단기 금리 역전과 고밸류에이션 리스크가 중기 불안 요소로 잠재하지만, Fed 인하 기대와 AI 수익화 모멘텀이 단기적으로 이를 상쇄합니다. 단기 비중 확대 가능하나 Mag7 실적 가이던스와 CPI 데이터에 주의를 기울여야 합니다.",
        key_insights: ["AI 수요 기반 Tech 섹터 구조적 강세 지속","VIX 15.8 저위험 + Risk-on 섹터 주도 = 단기 매수 우위","Fed 인하 기대감 38% — 6월 FOMC가 방향 결정 분기점"],
        risk_factors: ["장단기 금리 역전 지속 — 중기 경기 둔화 경고","Forward P/E 21.4배 고평가 — 실적 미스 시 급락 가능"],
        action_items: ["S&P500 ETF(SPY/VOO) 단기 비중 확대 고려","NVDA·MSFT 등 AI 수혜주 분할 매수","CPI·FOMC 이벤트 대비 현금 비중 10~15% 유지"],
        stance_votes: { "TechMo": "BUY", "MacroFed": "HOLD", "SectorRot": "BUY", "ValueFund": "HOLD" },
        market_weather: "partly_sunny",
        market_weather_icon: "🌤️",
        market_weather_en: "Cautious Optimism",
      },
      backtest: {
        agent_rankings: [
          { name:"TechMomentum",    avatar:"📈", hit_rate:0.0, total_predictions:0, correct:0 },
          { name:"MacroFed",        avatar:"🏛️", hit_rate:0.0, total_predictions:0, correct:0 },
          { name:"SectorRotation",  avatar:"🔄", hit_rate:0.0, total_predictions:0, correct:0 },
          { name:"ValueFundamental",avatar:"💎", hit_rate:0.0, total_predictions:0, correct:0 },
        ],
        yesterday_comparison: null,
        today_moderator: "Moderator",
      },
    };

    // ─── 유틸 ─────────────────────────────────────────────────────────────────
    const fmtNum = (v, d=2) => v == null ? "—" : Number(v).toLocaleString("en-US", {minimumFractionDigits:d, maximumFractionDigits:d});
    const fmtPct = v => v == null ? "—" : `${v > 0 ? "+" : ""}${Number(v).toFixed(2)}%`;
    const stanceColor = s => s === "BUY" ? "text-green-400" : s === "SELL" ? "text-red-400" : "text-yellow-400";
    const stanceGlow  = s => s === "BUY" ? "glow-buy"  : s === "SELL" ? "glow-sell"  : "glow-hold";
    const stanceTag   = s => s === "BUY" ? "tag-buy"   : s === "SELL" ? "tag-sell"   : "tag-hold";
    const stanceEmoji = s => s === "BUY" ? "🟢" : s === "SELL" ? "🔴" : "🟡";
    const changeColor = v => v > 0 ? "text-green-400" : v < 0 ? "text-red-400" : "text-slate-400";

    // ─── Header ───────────────────────────────────────────────────────────────
    function Header({ date, generatedAt }) {
      const fmt = d => { try { return new Date(d).toLocaleString("ko-KR",{month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"}); } catch { return d; } };
      return (
        <div className="us-flag-gradient border-b border-blue-900/40 px-6 py-5">
          <div className="max-w-6xl mx-auto flex items-center justify-between flex-wrap gap-3">
            <div className="flex items-center gap-3">
              <span className="text-3xl">🇺🇸</span>
              <div>
                <div className="text-lg font-black tracking-tight text-white">US Market Agent</div>
                <div className="text-xs text-blue-400 mono">Multi-Agent Debate — S&P500 · Nasdaq · Rates</div>
              </div>
            </div>
            <div className="text-right">
              <div className="text-sm font-bold text-slate-200">{date}</div>
              <div className="text-xs text-slate-500">업데이트: {fmt(generatedAt)}</div>
            </div>
          </div>
        </div>
      );
    }

    // ─── MarketOverview ───────────────────────────────────────────────────────
    function MarketOverview({ data }) {
      const indices = [
        { label: "S&P 500",  ...data.sp500,  icon: "📈" },
        { label: "Nasdaq",   ...data.nasdaq, icon: "💻" },
        { label: "DJIA",     ...data.djia,   icon: "🏭" },
        { label: "VIX",      ...data.vix,    icon: "😨" },
      ];
      const rates = data.rates || {};
      const dxy   = data.dxy   || {};
      const fed   = data.fed_watch || {};

      return (
        <div className="mb-6">
          <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-3">
            {indices.map(idx => (
              <div key={idx.label} className="card-bg rounded-xl p-3 border border-blue-900/30">
                <div className="text-xs text-slate-500 flex items-center gap-1 mb-1">{idx.icon} {idx.label}</div>
                <div className="text-lg font-bold mono text-white">{fmtNum(idx.close,0)}</div>
                <div className={`text-sm font-semibold ${changeColor(idx.change_pct)}`}>{fmtPct(idx.change_pct)}</div>
              </div>
            ))}
          </div>
          <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
            <div className="card-bg rounded-xl p-3 border border-blue-900/30">
              <div className="text-xs text-slate-500 mb-1">🏦 미 10Y / 2Y</div>
              <div className="text-sm font-bold mono text-white">{rates.us10y}% / {rates.us2y}%</div>
              <div className={`text-xs ${rates.yield_spread < 0 ? "text-red-400" : "text-green-400"}`}>
                스프레드: {rates.yield_spread > 0 ? "+" : ""}{rates.yield_spread}%
              </div>
            </div>
            <div className="card-bg rounded-xl p-3 border border-blue-900/30">
              <div className="text-xs text-slate-500 mb-1">💵 DXY 달러지수</div>
              <div className="text-sm font-bold mono text-white">{fmtNum(dxy.close)}</div>
              <div className={`text-xs ${changeColor(dxy.change_pct)}`}>{fmtPct(dxy.change_pct)}</div>
            </div>
            <div className="card-bg rounded-xl p-3 border border-blue-900/30">
              <div className="text-xs text-slate-500 mb-1">🏛️ Fed Watch</div>
              <div className="text-sm font-bold text-white">동결 {fed.hold_prob}%</div>
              <div className="text-xs text-green-400">인하 {fed.cut_prob}%</div>
            </div>
            <div className="card-bg rounded-xl p-3 border border-blue-900/30">
              <div className="text-xs text-slate-500 mb-1">📊 S&P Forward P/E</div>
              <div className="text-sm font-bold mono text-white">{(data.valuation||{}).sp500_forward_pe ? `${(data.valuation||{}).sp500_forward_pe}x` : "N/A"}</div>
              <div className="text-xs text-slate-400">역사적 평균 16-17x</div>
            </div>
          </div>
        </div>
      );
    }

    // ─── WeatherCard ──────────────────────────────────────────────────────────
    function WeatherCard({ verdict }) {
      const s = verdict.final_stance;
      const votes = verdict.stance_votes || {};
      const buyCount  = Object.values(votes).filter(v => v === "BUY").length;
      const sellCount = Object.values(votes).filter(v => v === "SELL").length;
      const holdCount = Object.values(votes).filter(v => v === "HOLD").length;
      return (
        <div className={`rounded-2xl border p-5 mb-6 ${stanceGlow(s)} ${s==="BUY"?"border-green-700/40":s==="SELL"?"border-red-700/40":"border-yellow-700/40"} card-bg`}>
          <div className="flex items-center justify-between flex-wrap gap-4">
            <div className="flex items-center gap-4">
              <div className="text-5xl">{verdict.market_weather_icon || "⛅"}</div>
              <div>
                <div className="text-xs text-slate-400 mb-1">오늘의 시장 날씨 (Market Outlook)</div>
                <div className={`text-2xl font-black ${stanceColor(s)}`}>{s}</div>
                <div className="text-sm text-slate-300 mt-0.5">{verdict.market_weather_en}</div>
              </div>
            </div>
            <div className="text-right">
              <div className="text-xs text-slate-400 mb-1">에이전트 투표</div>
              <div className="flex gap-2 justify-end mb-2">
                {Object.entries(votes).map(([name, vote]) => (
                  <span key={name} className={`text-xs px-2 py-0.5 rounded-full font-semibold ${stanceTag(vote)}`}>{name}: {vote}</span>
                ))}
              </div>
              <div className="text-xs text-slate-400">🟢 {buyCount}  🟡 {holdCount}  🔴 {sellCount}</div>
            </div>
          </div>
          <div className="mt-4">
            <div className="flex items-center justify-between text-xs text-slate-400 mb-1">
              <span>Moderator 확신도</span>
              <span className="font-bold text-white">{verdict.confidence_score}%</span>
            </div>
            <div className="h-2 bg-slate-700/50 rounded-full overflow-hidden">
              <div className={`h-full progress-bar rounded-full ${s==="BUY"?"bg-green-500":s==="SELL"?"bg-red-500":"bg-yellow-500"}`}
                   style={{width:`${verdict.confidence_score}%`}} />
            </div>
          </div>
          <div className="mt-3 text-sm text-slate-300 leading-relaxed">{verdict.summary}</div>
        </div>
      );
    }

    // ─── TechnicalIndicators ─────────────────────────────────────────────────
    function TechnicalIndicators({ ti }) {
      if (!ti) return null;
      const rsiColor = ti.rsi > 70 ? "text-red-400" : ti.rsi < 30 ? "text-green-400" : "text-blue-300";
      const macdDir  = ti.histogram > 0 ? "text-green-400" : "text-red-400";
      const bbPosLabel = ti.bb_position > 0.7 ? "상단근접 ⚠️" : ti.bb_position < 0.3 ? "하단근접 📉" : "중간구간 ✅";
      return (
        <div className="card-bg rounded-xl border border-blue-900/30 p-4 mb-4">
          <div className="text-xs text-slate-400 font-semibold mb-3">📊 S&P500 기술적 지표</div>
          <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
            <div>
              <div className="text-xs text-slate-500">RSI(14)</div>
              <div className={`text-xl font-bold mono ${rsiColor}`}>{ti.rsi}</div>
              <div className="text-xs text-slate-400">{ti.rsi > 70 ? "과매수" : ti.rsi < 30 ? "과매도" : "중립"}</div>
            </div>
            <div>
              <div className="text-xs text-slate-500">MACD / Hist</div>
              <div className="text-lg font-bold mono text-white">{ti.macd}</div>
              <div className={`text-xs ${macdDir}`}>Hist: {ti.histogram > 0 ? "+" : ""}{ti.histogram}</div>
            </div>
            <div>
              <div className="text-xs text-slate-500">볼린저밴드</div>
              <div className="text-lg font-bold text-white">{(ti.bb_position * 100).toFixed(0)}%</div>
              <div className="text-xs text-slate-400">{bbPosLabel}</div>
            </div>
            <div>
              <div className="text-xs text-slate-500">MA5 / 20 / 60</div>
              <div className="text-sm font-bold mono text-white">{ti.ma5}</div>
              <div className="text-xs text-slate-400">{ti.ma20} / {ti.ma60}</div>
            </div>
          </div>
        </div>
      );
    }

    // ─── AgentCards ──────────────────────────────────────────────────────────
    function AgentCards({ reports }) {
      const [expanded, setExpanded] = useState(null);
      return (
        <div className="mb-4">
          <div className="text-xs text-slate-400 font-semibold mb-2">🤖 에이전트 Phase 1 분석</div>
          <div className="space-y-2">
            {reports.map((r, i) => (
              <div key={i} className={`card-bg rounded-xl border p-3 cursor-pointer ${stanceGlow(r.stance)} ${r.stance==="BUY"?"border-green-800/30":r.stance==="SELL"?"border-red-800/30":"border-yellow-800/30"}`}
                   onClick={() => setExpanded(expanded === i ? null : i)}>
                <div className="flex items-center justify-between">
                  <div className="flex items-center gap-2">
                    <span className="text-xl">{r.avatar}</span>
                    <div>
                      <span className="font-bold text-sm text-white">{r.agent_name}</span>
                      <span className="text-xs text-slate-400 ml-2">{r.role}</span>
                    </div>
                  </div>
                  <div className="flex items-center gap-2">
                    <span className={`text-xs px-2 py-0.5 rounded-full font-bold ${stanceTag(r.stance)}`}>{stanceEmoji(r.stance)} {r.stance}</span>
                    <span className="text-xs text-slate-400">{r.confidence_score}%</span>
                    <span className="text-slate-500 text-xs">{expanded === i ? "▲" : "▼"}</span>
                  </div>
                </div>
                {expanded === i && (
                  <div className="mt-3 pt-3 border-t border-slate-700/40">
                    <div className="text-sm text-slate-300 leading-relaxed mb-2">{r.analysis}</div>
                    <div className="space-y-1">
                      {(r.key_points || []).map((kp, j) => (
                        <div key={j} className="flex items-start gap-1">
                          <span className="text-blue-400 text-xs mt-0.5">▸</span>
                          <span className="text-xs text-slate-400">{kp}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ─── SectorHeatmap ────────────────────────────────────────────────────────
    function SectorHeatmap({ sectors }) {
      if (!sectors) return null;
      const sorted = Object.entries(sectors).sort((a,b) => b[1].change_pct - a[1].change_pct);
      const max = Math.max(...sorted.map(([,v]) => Math.abs(v.change_pct)), 0.01);
      return (
        <div className="card-bg rounded-xl border border-blue-900/30 p-4 mb-4">
          <div className="text-xs text-slate-400 font-semibold mb-3">🔄 섹터 ETF 히트맵</div>
          <div className="grid grid-cols-3 gap-1.5">
            {sorted.map(([name, info]) => {
              const pct  = info.change_pct;
              const intensity = Math.min(Math.abs(pct) / max, 1);
              const bg = pct > 0
                ? `rgba(34,197,94,${0.1 + intensity * 0.35})`
                : `rgba(239,68,68,${0.1 + intensity * 0.35})`;
              return (
                <div key={name} className="rounded-lg p-2 text-center" style={{background: bg}}>
                  <div className="text-xs font-bold text-white">{name.split(" ")[0]}</div>
                  <div className={`text-xs font-semibold ${pct > 0 ? "text-green-300" : "text-red-300"}`}>{fmtPct(pct)}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ─── TopStocks ────────────────────────────────────────────────────────────
    function TopStocks({ stocks }) {
      if (!stocks || !stocks.length) return null;
      return (
        <div className="card-bg rounded-xl border border-blue-900/30 p-4 mb-4">
          <div className="text-xs text-slate-400 font-semibold mb-3">🏆 Mag7 + 주요 종목</div>
          <div className="space-y-1.5">
            {stocks.slice(0, 8).map((s, i) => (
              <div key={i} className="flex items-center justify-between text-sm">
                <div className="flex items-center gap-2">
                  <span className="text-xs text-slate-500 mono w-10">{s.ticker}</span>
                  <span className="text-slate-200">{s.name}</span>
                </div>
                <div className="flex items-center gap-3">
                  <span className="mono text-slate-200">${fmtNum(s.close)}</span>
                  <span className={`w-16 text-right font-semibold ${changeColor(s.change_pct)}`}>{fmtPct(s.change_pct)}</span>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ─── ActionItems ──────────────────────────────────────────────────────────
    function ActionItems({ verdict }) {
      return (
        <div className="card-bg rounded-xl border border-blue-900/30 p-4 mb-4">
          <div className="text-xs text-slate-400 font-semibold mb-3">🎯 Action Items</div>
          <div className="space-y-2">
            {(verdict.action_items || []).map((item, i) => (
              <div key={i} className="flex items-start gap-2">
                <span className="text-blue-400 text-xs mt-0.5">▸</span>
                <span className="text-sm text-slate-300">{item}</span>
              </div>
            ))}
          </div>
          <div className="mt-4">
            <div className="text-xs text-slate-400 mb-2">⚠️ 리스크 요인</div>
            <div className="flex flex-wrap gap-2">
              {(verdict.risk_factors || []).map((r, i) => (
                <span key={i} className="text-xs px-2 py-1 rounded bg-red-900/20 text-red-300 border border-red-700/30">{r}</span>
              ))}
            </div>
          </div>
          <div className="mt-4">
            <div className="text-xs text-slate-400 mb-2">💡 Key Insights</div>
            <div className="space-y-1">
              {(verdict.key_insights || []).map((ins, i) => (
                <div key={i} className="flex items-start gap-2">
                  <span className="text-yellow-400 text-xs">✦</span>
                  <span className="text-xs text-slate-300">{ins}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ─── DebateTimeline ───────────────────────────────────────────────────────
    function DebateTimeline({ reports, critiques }) {
      const agentMap = Object.fromEntries((reports || []).map(r => [r.agent_name, r]));
      return (
        <div className="card-bg rounded-xl border border-blue-900/30 p-4 mb-4">
          <div className="text-xs text-slate-400 font-semibold mb-3">💬 Phase 2 교차 반론</div>
          <div className="space-y-3">
            {(critiques || []).map((c, i) => {
              const fromAgent = agentMap[c.from_agent] || {};
              const isLeft = i % 2 === 0;
              return (
                <div key={i} className={`flex gap-2 ${isLeft ? "" : "flex-row-reverse"}`}>
                  <div className="text-xl flex-shrink-0 mt-0.5">{fromAgent.avatar || "🤖"}</div>
                  <div className="max-w-[85%]">
                    <div className={`text-xs text-slate-400 mb-1 ${isLeft ? "" : "text-right"}`}>
                      <span className="font-semibold text-white">{c.from_agent}</span>
                      <span className="text-slate-500"> → {c.to_agent}</span>
                    </div>
                    <div className={`card-bg rounded-xl p-3 text-sm text-slate-300 border border-slate-700/30 leading-relaxed ${isLeft ? "bubble-left" : "bubble-right"}`}>
                      {c.critique}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ─── BacktestLeaderboard ─────────────────────────────────────────────────
    function BacktestLeaderboard({ backtest }) {
      if (!backtest) return null;
      const { agent_rankings: rankings, yesterday_comparison: yc, today_moderator: todayMod } = backtest;
      const hasData = rankings && rankings.length > 0 && rankings.some(r => r.total_predictions > 0);

      const movementIcon = m => m === "UP" ? "📈" : m === "DOWN" ? "📉" : "➡️";
      const movementColor = m => m === "UP" ? "text-green-400" : m === "DOWN" ? "text-red-400" : "text-slate-400";

      return (
        <div className="card-bg rounded-xl border border-blue-900/30 p-4 mb-4">
          <div className="flex items-center justify-between mb-3">
            <div className="text-xs text-slate-400 font-semibold">🏆 에이전트 적중률 리더보드</div>
            {todayMod && todayMod !== "Moderator" && (
              <div className="flex items-center gap-1">
                <span className="text-xs text-slate-500">오늘의 중재자</span>
                <span className="text-xs font-bold text-yellow-300 bg-yellow-900/30 border border-yellow-700/30 px-2 py-0.5 rounded-full">
                  👑 {todayMod}
                </span>
              </div>
            )}
          </div>

          {!hasData && (
            <div className="flex flex-col items-center justify-center py-6 text-center">
              <div className="text-3xl mb-3">📊</div>
              <p className="text-sm font-semibold text-slate-300 mb-1">데이터 누적 중</p>
              <p className="text-xs text-slate-500">다음 거래일 분석 후부터 S&P500 예측 적중률이 집계됩니다</p>
            </div>
          )}

          {hasData && (
            <div className="space-y-2 mb-4">
              {(rankings || []).map((r, i) => {
                const hitPct = r.total_predictions > 0 ? Math.round(r.hit_rate * 100) : 0;
                const medal = i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : `${i+1}.`;
                const barColor = hitPct >= 60 ? "bg-green-500" : hitPct >= 40 ? "bg-yellow-500" : "bg-red-500";
                return (
                  <div key={r.name} className="flex items-center gap-2">
                    <span className="text-sm w-6 text-center">{medal}</span>
                    <span className="text-base w-6 text-center">{r.avatar}</span>
                    <div className="flex-1">
                      <div className="flex items-center justify-between mb-0.5">
                        <span className="text-xs font-semibold text-slate-200">{r.name}</span>
                        <span className="text-xs text-slate-400 mono">{r.correct}/{r.total_predictions} ({hitPct}%)</span>
                      </div>
                      <div className="h-1.5 bg-slate-700/50 rounded-full overflow-hidden">
                        <div className={`h-full progress-bar rounded-full ${barColor}`} style={{width:`${hitPct}%`}} />
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {yc && (
            <div className="border-t border-slate-700/40 pt-3 mt-3">
              <div className="text-xs text-slate-400 mb-2">
                📅 어제 ({yc.date}) S&P500 실제 움직임:
                <span className={`font-bold ml-1 ${movementColor(yc.actual_movement)}`}>
                  {movementIcon(yc.actual_movement)} {yc.actual_movement}
                </span>
              </div>
              <div className="flex flex-wrap gap-2">
                {(yc.predictions || []).map((p, i) => (
                  <div key={i} className={`flex items-center gap-1 text-xs px-2 py-1 rounded-lg border ${p.was_correct ? "bg-green-900/20 border-green-700/30 text-green-300" : "bg-red-900/20 border-red-700/30 text-red-300"}`}>
                    <span>{p.avatar}</span>
                    <span className="font-semibold">{p.agent}</span>
                    <span className="text-slate-400">→</span>
                    <span>{p.prediction}</span>
                    <span>{p.was_correct ? "✅" : "❌"}</span>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }

    // ─── App ─────────────────────────────────────────────────────────────────
    function App() {
      const [report, setReport] = useState(null);
      const [loading, setLoading] = useState(true);
      const [usingSample, setUsingSample] = useState(false);

      useEffect(() => {
        fetch("./data/daily_report.json?t=" + Date.now())
          .then(r => { if (!r.ok) throw new Error(); return r.json(); })
          .then(data => { setReport(data); setLoading(false); })
          .catch(() => { setReport(SAMPLE); setUsingSample(true); setLoading(false); });
      }, []);

      if (loading) return (
        <div className="flex items-center justify-center h-screen">
          <div className="text-center">
            <div className="text-5xl mb-4 pulse-slow">🇺🇸</div>
            <div className="text-slate-300 font-semibold">US Market Agent 분석 로딩 중...</div>
          </div>
        </div>
      );

      const { date, generated_at, market_data: md, debate, verdict, backtest } = report;

      return (
        <div className="min-h-screen">
          <Header date={date} generatedAt={generated_at} />
          {usingSample && (
            <div className="bg-blue-900/30 border-b border-blue-700/30 px-6 py-2 text-xs text-blue-300 text-center">
              ⚠️ 샘플 데이터 표시 중 — GitHub Actions 자동화 후 실제 데이터로 업데이트됩니다
            </div>
          )}
          <div className="max-w-6xl mx-auto px-4 py-6">
            <MarketOverview data={md} />
            <WeatherCard verdict={verdict} />
            <TechnicalIndicators ti={md.technical_indicators} />
            <div className="grid md:grid-cols-2 gap-4">
              <div>
                <AgentCards reports={debate.phase1_reports} />
                <ActionItems verdict={verdict} />
              </div>
              <div>
                <SectorHeatmap sectors={md.sectors} />
                <TopStocks stocks={md.top_stocks} />
              </div>
            </div>
            <BacktestLeaderboard backtest={backtest} />
            <DebateTimeline reports={debate.phase1_reports} critiques={debate.phase2_critiques} />
            <div className="text-center py-8 text-xs text-slate-600">
              <div className="mb-1">🤖 US Market Agent — Multi-Agent Debate System</div>
              <div>TechMo · MacroFed · SectorRot · ValueFund | {date}</div>
              <div className="mt-1">⚠️ 본 보고서는 AI 생성 정보이며 투자 결정의 최종 책임은 투자자 본인에게 있습니다.</div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
