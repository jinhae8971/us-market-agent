    // ─── 유틸 ──────────────────────────────────────────
    const pct = (v) => {
      if (v === null || v === undefined) return '—';
      return v >= 0 ? `+${parseFloat(v).toFixed(2)}%` : `${parseFloat(v).toFixed(2)}%`;
    };
    const stanceColor = { BUY:"text-green-600", HOLD:"text-amber-600", SELL:"text-red-600" };
    const stanceBg    = { BUY:"tag-buy",        HOLD:"tag-hold",        SELL:"tag-sell" };
    const stanceGlow  = { BUY:"glow-buy",       HOLD:"glow-hold",       SELL:"glow-sell" };

    const AGENT_COLORS = {
      TechMomentum:  { border:"border-blue-500", dot:"bg-blue-500", badge:"bg-blue-100 text-blue-700" },
      MacroFed:      { border:"border-purple-500", dot:"bg-purple-500", badge:"bg-purple-100 text-purple-700" },
      SectorRotation:{ border:"border-green-500", dot:"bg-green-500", badge:"bg-green-100 text-green-700" },
      ValueFundamental:{ border:"border-amber-500", dot:"bg-amber-500", badge:"bg-amber-100 text-amber-700" },
      GlobalNews:    { border:"border-pink-500", dot:"bg-pink-500", badge:"bg-pink-100 text-pink-700" },
    };

    function detectAgentKey(name) {
      const n = (name || '').toLowerCase();
      if (n.includes('글로벌') || n.includes('헌터') || n.includes('news') || n.includes('event')) return 'GlobalNews';
      if (n.includes('tech'))   return 'TechMomentum';
      if (n.includes('macro') || n.includes('fed')) return 'MacroFed';
      if (n.includes('sector') || n.includes('rot')) return 'SectorRotation';
      if (n.includes('value') || n.includes('fund')) return 'ValueFundamental';
      return 'TechMomentum';
    }

    function getAgentColor(name) {
      return AGENT_COLORS[detectAgentKey(name)] || AGENT_COLORS.TechMomentum;
    }

    function stripJsonFence(str) {
      if (!str) return str;
      return str.replace(/^```json\s*/i, '').replace(/^```\s*/i, '').replace(/\s*```$/, '').trim();
    }

    function extractCritiqueText(raw) {
      let text = raw || '';
      text = stripJsonFence(text);
      try {
        const obj = JSON.parse(text);
        return obj.counter_argument || obj.critique || obj.rebuttal?.critique || obj['반론_요약'] || obj.결론 || obj.counter || text;
      } catch (_) {}
      return text.replace(/[{}"\\]/g, '').replace(/\n+/g, ' ').trim();
    }

    // ─── 컴포넌트 ──────────────────────────────────────

    function Header({ date, generatedAt }) {
      const d = new Date(generatedAt);
      const timeStr = isNaN(d) ? "" : d.toLocaleTimeString("ko-KR", { hour:"2-digit", minute:"2-digit" });
      return (
        <div className="header-gradient border-b border-gray-200 px-4 sm:px-6 py-4 sm:py-5 flex flex-col md:flex-row md:items-center md:justify-between gap-3">
          <div className="flex items-center gap-3">
            <div className="text-3xl">🇺🇸</div>
            <div>
              <h1 className="text-lg sm:text-xl font-black tracking-tight text-gray-900">
                US Market Agent <span className="us-accent text-sm font-bold ml-1">LIVE</span>
              </h1>
              <p className="text-xs text-gray-500 mono tracking-wider">QUINTET MULTI-AGENT DEBATE SYSTEM</p>
            </div>
          </div>
          <div className="text-right">
            <div className="text-sm font-semibold text-gray-700">{date}</div>
            {timeStr && <div className="text-xs text-gray-400">생성 {timeStr}</div>}
          </div>
        </div>
      );
    }

    function IndexBar({ data }) {
      const items = [
        { label:"S&P 500",  val: data.sp500?.close,  chg: data.sp500?.change_pct },
        { label:"NASDAQ",   val: data.nasdaq?.close,  chg: data.nasdaq?.change_pct },
        { label:"DOW",      val: data.djia?.close,    chg: data.djia?.change_pct, dec:0 },
        { label:"RUSSELL",  val: data.russell?.close,  chg: data.russell?.change_pct },
        { label:"VIX",      val: data.vix?.close,     chg: data.vix?.change_pct },
        { label:"DXY",      val: data.dxy?.close,     chg: data.dxy?.change_pct },
        { label:"US 10Y",   val: data.rates?.us10y ? data.rates.us10y+"%" : null, chg: null, isBond: true },
        { label:"SPREAD",   val: data.rates?.yield_spread, chg: null, isSpread: true },
      ];

      return (
        <div className="grid grid-cols-4 md:grid-cols-8 bg-white border-b border-gray-200">
          {items.map((item, i) => {
            const up = item.chg > 0;
            const dn = item.chg < 0;
            let displayVal = '—';
            if (item.isBond) displayVal = item.val || '—';
            else if (item.isSpread) displayVal = item.val !== undefined ? (item.val >= 0 ? '+' : '') + parseFloat(item.val).toFixed(2) + '%' : '—';
            else displayVal = item.val ? parseFloat(item.val).toLocaleString('en-US', {minimumFractionDigits: item.dec ?? 2, maximumFractionDigits: item.dec ?? 2}) : '—';

            return (
              <div key={i} className="px-2 sm:px-3 py-2 border-r border-b md:border-b-0 border-gray-200 last:border-r-0">
                <div className="text-[8px] sm:text-[9px] text-gray-500 tracking-wider uppercase mb-0.5">{item.label}</div>
                <div className="text-xs sm:text-sm font-bold mono text-gray-900">{displayVal}</div>
                {item.chg !== null && item.chg !== undefined && (
                  <div className={`text-[10px] font-semibold ${up ? "text-green-600" : dn ? "text-red-600" : "text-gray-400"}`}>
                    {pct(item.chg)}
                  </div>
                )}
                {item.isSpread && (
                  <div className="text-[9px] text-gray-400">10Y-2Y</div>
                )}
              </div>
            );
          })}
        </div>
      );
    }

    function WeatherCard({ verdict }) {
      if (!verdict) return null;
      const { market_weather_icon: icon, market_weather_en: label,
              final_stance: stance, confidence_score: conf, summary } = verdict;
      const colors = {
        BUY:  "bg-green-50 border-green-200",
        HOLD: "bg-amber-50 border-amber-200",
        SELL: "bg-red-50 border-red-200",
      };
      return (
        <div className={`rounded-lg p-4 sm:p-6 border ${colors[stance] || colors.HOLD} mb-4 sm:mb-6`}>
          <div className="flex flex-col md:flex-row md:items-center gap-4">
            <div className="text-center md:text-left flex-shrink-0">
              <div className="text-5xl sm:text-6xl mb-2">{icon || "⛅"}</div>
              <div className="text-sm sm:text-lg font-bold text-gray-900">{label || "Loading..."}</div>
            </div>
            <div className="flex-1 min-w-0">
              <div className="flex items-center gap-3 mb-3 flex-wrap">
                <span className={`px-3 py-1 rounded-full text-sm font-bold ${stanceBg[stance]}`}>{stance}</span>
                <span className="text-gray-700 text-sm">확신도</span>
                <div className="flex-1 bg-gray-200 rounded-full h-2 max-w-32 min-w-16">
                  <div className={`h-2 rounded-full progress-bar ${stance==="BUY"?"bg-green-600":stance==="SELL"?"bg-red-600":"bg-amber-600"}`}
                    style={{ width:`${conf}%` }} />
                </div>
                <span className="mono text-sm font-bold text-gray-900">{conf}%</span>
              </div>
              <p className="text-sm text-gray-700 leading-relaxed">{summary}</p>

              {/* Agent Votes */}
              {verdict.stance_votes && (
                <div className="flex flex-wrap gap-2 mt-3">
                  {Object.entries(verdict.stance_votes).map(([agent, vstance]) => (
                    <span key={agent} className={`text-xs px-2 py-0.5 rounded ${stanceBg[vstance]}`}>
                      {agent.length > 12 ? agent.slice(0,10)+"…" : agent}: {vstance}
                    </span>
                  ))}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    function VerdictDetails({ verdict }) {
      if (!verdict) return null;
      return (
        <div className="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-4 sm:mb-6">
          <div className="card-gradient rounded-lg p-4 border border-gray-200">
            <h4 className="text-xs font-bold text-green-700 tracking-wider uppercase mb-2">💡 Key Insights</h4>
            <div className="space-y-1">
              {(verdict.key_insights || []).map((item, i) => (
                <div key={i} className="flex items-start gap-2 text-xs text-gray-600">
                  <span className="text-green-600 mt-0.5">▸</span><span>{item}</span>
                </div>
              ))}
            </div>
          </div>
          <div className="card-gradient rounded-lg p-4 border border-gray-200">
            <h4 className="text-xs font-bold text-red-700 tracking-wider uppercase mb-2">⚠️ Risk Factors</h4>
            <div className="space-y-1">
              {(verdict.risk_factors || []).map((item, i) => (
                <div key={i} className="flex items-start gap-2 text-xs text-gray-600">
                  <span className="text-red-600 mt-0.5">⚠</span><span>{item}</span>
                </div>
              ))}
            </div>
          </div>
          <div className="card-gradient rounded-lg p-4 border border-gray-200">
            <h4 className="text-xs font-bold text-blue-700 tracking-wider uppercase mb-2">→ Action Items</h4>
            <div className="space-y-1">
              {(verdict.action_items || []).map((item, i) => (
                <div key={i} className="flex items-start gap-2 text-xs text-gray-600">
                  <span className="text-blue-600 mt-0.5">→</span><span>{item}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    function TechnicalIndicators({ ti }) {
      if (!ti) return null;
      const rsi = parseFloat(ti.rsi || 50);
      const rsiColor = rsi > 70 ? "text-red-600" : rsi < 30 ? "text-green-600" : "text-blue-600";
      const macd = parseFloat(ti.macd || 0);
      const hist = parseFloat(ti.histogram || 0);
      const macdColor = hist > 0 ? "text-green-600" : "text-red-600";
      const bbPos = parseFloat(ti.bb_position || 0.5);

      const mas = [
        { name:"MA5", diff: ti.ma5_diff_pct },
        { name:"MA20", diff: ti.ma20_diff_pct },
        { name:"MA60", diff: ti.ma60_diff_pct },
      ].filter(m => m.diff !== undefined);

      return (
        <div className="card-gradient rounded-lg p-4 border border-gray-200 mb-4 sm:mb-6">
          <h3 className="text-sm font-bold text-gray-900 mb-3">📉 기술적 지표 (S&P 500)</h3>
          <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-6 gap-2 sm:gap-3 text-center">
            <div className="bg-gray-50 rounded-lg p-2 sm:p-3 col-span-2 sm:col-span-1 border border-gray-200">
              <div className="text-[10px] text-gray-500 mb-1">RSI(14)</div>
              <div className={`text-lg font-bold mono ${rsiColor}`}>{rsi.toFixed(1)}</div>
              <div className="mt-1 h-1.5 bg-gray-200 rounded-full relative">
                <div className="absolute top-[-2px] w-1 h-2.5 bg-gray-400 rounded-sm" style={{left:`${rsi}%`, transform:'translateX(-50%)'}} />
              </div>
            </div>
            <div className="bg-gray-50 rounded-lg p-2 sm:p-3 border border-gray-200">
              <div className="text-[10px] text-gray-500 mb-1">MACD</div>
              <div className={`text-sm font-bold mono ${macdColor}`}>{macd.toFixed(2)}</div>
              <div className="text-[10px] text-gray-500 mt-1">Hist: <span className={macdColor}>{hist >= 0 ? '+' : ''}{hist.toFixed(2)}</span></div>
            </div>
            <div className="bg-gray-50 rounded-lg p-2 sm:p-3 border border-gray-200">
              <div className="text-[10px] text-gray-500 mb-1">BB Position</div>
              <div className="text-sm font-bold mono text-purple-600">{(bbPos*100).toFixed(0)}%</div>
              <div className="mt-1 h-1.5 bg-gray-200 rounded-full relative">
                <div className="absolute top-[-2px] w-1 h-2.5 bg-purple-400 rounded-sm" style={{left:`${bbPos*100}%`, transform:'translateX(-50%)'}} />
              </div>
            </div>
            {mas.map(m => {
              const d = parseFloat(m.diff);
              return (
                <div key={m.name} className="bg-gray-50 rounded-lg p-2 sm:p-3 border border-gray-200">
                  <div className="text-[10px] text-gray-500 mb-1">{m.name}</div>
                  <div className={`text-sm font-bold mono ${d >= 0 ? "text-green-600" : "text-red-600"}`}>
                    {d >= 0 ? '+' : ''}{d.toFixed(2)}%
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function FedWatch({ fedWatch }) {
      if (!fedWatch) return null;
      const bars = [
        { label:"동결 HOLD", val: fedWatch.hold_prob || 0, color:"bg-amber-500" },
        { label:"인하 CUT",  val: fedWatch.cut_prob || 0,  color:"bg-green-600" },
        { label:"인상 HIKE", val: fedWatch.hike_prob || 0, color:"bg-red-600" },
      ];
      return (
        <div className="card-gradient rounded-lg p-4 border border-gray-200 mb-4 sm:mb-6">
          <h3 className="text-sm font-bold text-gray-900 mb-3">🏛️ Fed Watch — 금리 방향</h3>
          <div className="space-y-3">
            {bars.map(b => (
              <div key={b.label} className="flex items-center gap-3">
                <span className="text-xs text-gray-600 w-16 sm:w-20 flex-shrink-0">{b.label}</span>
                <div className="flex-1 bg-gray-200 rounded-full h-4 sm:h-5 overflow-hidden">
                  <div className={`h-full rounded-full ${b.color} progress-bar flex items-center justify-end pr-2`}
                    style={{ width:`${b.val}%` }}>
                    {b.val >= 15 && <span className="text-[9px] font-bold text-white">{b.val}%</span>}
                  </div>
                </div>
                {b.val < 15 && <span className="text-xs mono text-gray-500">{b.val}%</span>}
              </div>
            ))}
          </div>
        </div>
      );
    }

    function AgentStanceCards({ reports }) {
      return (
        <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-2 sm:gap-3 mb-4 sm:mb-6">
          {(reports || []).map(r => {
            const ac = getAgentColor(r.agent_name);
            return (
              <div key={r.agent_name} className={`card-gradient rounded-lg p-3 sm:p-4 border-2 border-t-2 ${ac.border}`}>
                <div className="text-2xl sm:text-3xl mb-1 sm:mb-2">{r.avatar}</div>
                <div className="text-xs sm:text-sm font-bold text-gray-900 truncate">{r.agent_name}</div>
                <div className="text-[10px] text-gray-500 mb-2 truncate">{r.role}</div>
                <div className={`inline-block px-2 py-0.5 rounded text-xs font-bold ${stanceBg[r.stance]}`}>{r.stance}</div>
                <div className="mt-2">
                  <div className="flex items-center gap-1">
                    <div className="flex-1 bg-gray-200 rounded-full h-1.5">
                      <div className={`h-1.5 rounded-full progress-bar ${r.stance==="BUY"?"bg-green-600":r.stance==="SELL"?"bg-red-600":"bg-amber-600"}`}
                        style={{ width:`${r.confidence_score}%` }} />
                    </div>
                    <span className="text-[10px] mono text-gray-500">{r.confidence_score}</span>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    function SectorHeatmap({ sectors, topSectors, topStocks }) {
      const sectorEntries = sectors ? Object.entries(sectors).sort((a,b) => b[1].change_pct - a[1].change_pct) : [];

      return (
        <div className="card-gradient rounded-lg border border-gray-200 mb-4 sm:mb-6">
          <div className="p-4 border-b border-gray-200 flex items-center gap-2">
            <span className="text-lg">🔥</span>
            <h3 className="font-bold text-gray-900">섹터 & 종목 현황</h3>
          </div>
          <div className="p-3 sm:p-4">
            {/* Top Sectors */}
            {topSectors && (
              <div className="mb-4">
                <div className="text-xs text-gray-600 mb-2">✨ 주목 섹터 (Moderator 선정)</div>
                <div className="flex flex-wrap gap-2">
                  {topSectors.map((s, i) => (
                    <span key={i} className={`px-2 sm:px-3 py-1 rounded-full text-[10px] sm:text-xs font-bold
                      ${i===0?"bg-green-100 text-green-700 border border-green-300":
                        i===1?"bg-blue-100 text-blue-700 border border-blue-300":
                               "bg-purple-100 text-purple-700 border border-purple-300"}`}>
                      {i===0?"🥇":i===1?"🥈":"🥉"} {s}
                    </span>
                  ))}
                </div>
              </div>
            )}

            {/* Sector Performance Bars */}
            {sectorEntries.length > 0 && (
              <div className="mb-4 space-y-1">
                <div className="text-xs text-gray-600 mb-2">📈 섹터 ETF 등락률 (당일)</div>
                {sectorEntries.map(([name, data]) => {
                  const v = parseFloat(data.change_pct);
                  const w = Math.min(Math.abs(v) * 20, 100);
                  const up = v >= 0;
                  return (
                    <div key={name} className="flex items-center gap-2">
                      <span className="text-[10px] text-gray-600 w-24 sm:w-32 truncate flex-shrink-0">{name.split('(')[0].trim()}</span>
                      <div className="flex-1 h-3 sm:h-4 bg-gray-200 rounded overflow-hidden relative">
                        <div className={`h-full rounded ${up ? "bg-green-500" : "bg-red-500"}`}
                          style={{ width: `${w}%`, marginLeft: up ? '50%' : `${50 - w}%` }} />
                        <div className="absolute inset-0 flex items-center justify-center">
                          <span className={`text-[9px] sm:text-[10px] font-bold text-white`}>
                            {pct(v)}
                          </span>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {/* Top Stocks Grid */}
            <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
              {(topStocks || []).map((s, i) => {
                const up = s.change_pct > 0;
                return (
                  <a key={i} href={`https://www.tradingview.com/chart/?symbol=${s.ticker}`}
                    target="_blank" rel="noopener"
                    className={`rounded-lg p-2 sm:p-3 text-center hover:shadow-md transition-all block border ${
                      up ? "bg-green-50 border-green-200 text-green-700" : "bg-red-50 border-red-200 text-red-700"
                    }`}>
                    <div className="text-[10px] font-bold">{s.ticker}</div>
                    <div className="text-[10px] text-gray-600 truncate">{s.name}</div>
                    <div className={`text-sm font-bold mt-1 ${up?"text-green-600":"text-red-600"}`}>
                      {pct(s.change_pct)}
                    </div>
                    {s.close && <div className="text-[10px] text-gray-500 mono">${parseFloat(s.close).toLocaleString()}</div>}
                  </a>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    function RatesEarnings({ rates, earnings, valuation }) {
      return (
        <div className="card-gradient rounded-lg border border-gray-200 mb-4 sm:mb-6 p-4">
          <h3 className="text-sm font-bold text-gray-900 mb-3">💰 금리 / 실적 / 밸류에이션</h3>
          <div className="grid grid-cols-3 sm:grid-cols-6 gap-2 sm:gap-3 text-center">
            {rates && (
              <>
                <div className="bg-gray-50 rounded-lg p-2 border border-gray-200">
                  <div className="text-[10px] text-gray-500">US 10Y</div>
                  <div className="text-sm font-bold mono text-gray-900">{rates.us10y}%</div>
                </div>
                <div className="bg-gray-50 rounded-lg p-2 border border-gray-200">
                  <div className="text-[10px] text-gray-500">US 2Y</div>
                  <div className="text-sm font-bold mono text-gray-900">{rates.us2y}%</div>
                </div>
                <div className="bg-gray-50 rounded-lg p-2 border border-gray-200">
                  <div className="text-[10px] text-gray-500">10Y-2Y</div>
                  <div className={`text-sm font-bold mono ${rates.yield_spread >= 0 ? "text-green-600" : "text-red-600"}`}>
                    {rates.yield_spread >= 0 ? '+' : ''}{parseFloat(rates.yield_spread).toFixed(2)}%
                  </div>
                </div>
              </>
            )}
            {earnings && (
              <>
                <div className="bg-gray-50 rounded-lg p-2 border border-gray-200">
                  <div className="text-[10px] text-gray-500">EPS 성장률</div>
                  <div className="text-sm font-bold mono text-green-600">{earnings.eps_growth}%</div>
                </div>
                <div className="bg-gray-50 rounded-lg p-2 border border-gray-200">
                  <div className="text-[10px] text-gray-500">어닝 비트율</div>
                  <div className="text-sm font-bold mono text-gray-900">{earnings.beat_rate}</div>
                </div>
              </>
            )}
            {valuation && (
              <div className="bg-gray-50 rounded-lg p-2 border border-gray-200">
                <div className="text-[10px] text-gray-500">배당수익률</div>
                <div className="text-sm font-bold mono text-amber-600">{valuation.sp500_div_yield}%</div>
              </div>
            )}
          </div>
        </div>
      );
    }

    function DebateTimeline({ reports, critiques }) {
      const [expanded, setExpanded] = useState(null);
      return (
        <div className="card-gradient rounded-lg border border-gray-200 mb-4 sm:mb-6">
          <div className="p-4 border-b border-gray-200 flex items-center gap-2 flex-wrap">
            <span className="text-lg">💬</span>
            <h3 className="font-bold text-gray-900">에이전트 토론 타임라인</h3>
            <span className="text-xs text-gray-500 ml-2">Phase 1 독립 분석 → Phase 2 교차 반론</span>
          </div>
          <div className="p-3 sm:p-4 space-y-3 sm:space-y-4 max-h-[500px] overflow-y-auto">
            {/* Phase 1 */}
            <div className="text-xs text-gray-500 font-semibold uppercase tracking-wider py-1 border-b border-gray-200">
              Phase 1 — 독립 분석 보고서
            </div>
            {(reports || []).map((r, i) => {
              const ac = getAgentColor(r.agent_name);
              return (
                <div key={i} className={`flex gap-2 sm:gap-3 ${i % 2 === 0 ? "" : "flex-row-reverse"}`}>
                  <div className="text-xl sm:text-2xl flex-shrink-0">{r.avatar}</div>
                  <div className={`max-w-[85%] sm:max-w-[80%] ${i % 2 === 0 ? "bubble-left" : "bubble-right"} bg-white rounded-2xl p-3 border border-gray-200`}>
                    <div className="flex items-center gap-2 mb-1 flex-wrap">
                      <span className="text-xs font-bold text-gray-900">{r.agent_name}</span>
                      <span className={`text-[10px] px-1.5 py-0.5 rounded font-bold ${stanceBg[r.stance]}`}>{r.stance}</span>
                      <span className="text-[10px] text-gray-500">{r.confidence_score}%</span>
                    </div>
                    <p className="text-xs text-gray-700 leading-relaxed">
                      {expanded === `r${i}` ? r.analysis : (r.analysis || '').slice(0,120) + "..."}
                    </p>
                    <button onClick={() => setExpanded(expanded === `r${i}` ? null : `r${i}`)}
                      className="text-xs text-blue-600 mt-1 hover:text-blue-700">
                      {expanded === `r${i}` ? "접기" : "더 보기"}
                    </button>
                    {r.key_points && (
                      <div className="mt-2 space-y-1">
                        {r.key_points.slice(0,2).map((kp, j) => (
                          <div key={j} className="text-[10px] sm:text-xs text-gray-600 flex gap-1">
                            <span className="text-blue-600">▸</span>{kp}
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                </div>
              );
            })}

            {/* Phase 2 */}
            {critiques && critiques.length > 0 && (
              <>
                <div className="text-xs text-gray-500 font-semibold uppercase tracking-wider py-1 border-b border-gray-200 mt-4">
                  Phase 2 — 교차 반론
                </div>
                {critiques.map((c, i) => {
                  const isRight = i % 2 !== 0;
                  const fromReport = (reports || []).find(r => r.agent_name === c.from_agent);
                  const text = extractCritiqueText(c.critique);
                  return (
                    <div key={i} className={`flex gap-2 sm:gap-3 ${isRight ? "flex-row-reverse" : ""}`}>
                      <div className="text-xl sm:text-2xl flex-shrink-0">{fromReport?.avatar || "🤖"}</div>
                      <div className={`max-w-[85%] sm:max-w-[80%] ${isRight ? "bubble-right" : "bubble-left"} bg-amber-50 rounded-2xl p-3 border border-amber-200`}>
                        <div className="flex items-center gap-2 mb-1 flex-wrap">
                          <span className="text-xs font-bold text-amber-900">{c.from_agent}</span>
                          <span className="text-[10px] text-gray-500">→</span>
                          <span className="text-xs text-gray-600">{c.to_agent}</span>
                        </div>
                        <p className="text-xs text-gray-700 leading-relaxed">
                          {expanded === `c${i}` ? text : text.slice(0,150) + (text.length > 150 ? "..." : "")}
                        </p>
                        {text.length > 150 && (
                          <button onClick={() => setExpanded(expanded === `c${i}` ? null : `c${i}`)}
                            className="text-xs text-amber-700 mt-1 hover:text-amber-800">
                            {expanded === `c${i}` ? "접기" : "더 보기"}
                          </button>
                        )}
                      </div>
                    </div>
                  );
                })}
              </>
            )}
          </div>
        </div>
      );
    }

    function BacktestLeaderboard({ backtest }) {
      if (!backtest) return null;
      const { agent_rankings: rankings, yesterday_comparison: yc } = backtest;
      return (
        <div className="card-gradient rounded-lg border border-gray-200 mb-4 sm:mb-6">
          <div className="p-4 border-b border-gray-200 flex items-center gap-2">
            <span className="text-lg">🏆</span>
            <h3 className="font-bold text-gray-900">에이전트 적중률 리더보드</h3>
            <span className="text-xs text-gray-500 ml-2">누적 백테스트 기준</span>
          </div>
          <div className="p-3 sm:p-4">
            <div className="space-y-2 sm:space-y-3 mb-4">
              {(rankings || []).map((r, i) => (
                <div key={i} className="flex items-center gap-2 sm:gap-3">
                  <div className="text-base sm:text-lg w-6 sm:w-8 text-center">{i===0?"🥇":i===1?"🥈":i===2?"🥉":i===3?"4️⃣":"5️⃣"}</div>
                  <div className="text-lg sm:text-xl">{r.avatar}</div>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center justify-between mb-1">
                      <span className="text-xs sm:text-sm font-semibold text-gray-900 truncate">{r.name}</span>
                      <span className="text-[10px] sm:text-xs mono text-gray-500 flex-shrink-0">{r.correct}/{r.total_predictions}회</span>
                    </div>
                    <div className="flex items-center gap-2">
                      <div className="flex-1 bg-gray-200 rounded-full h-2">
                        <div className={`h-2 rounded-full progress-bar ${i===0?"bg-amber-500":i===1?"bg-gray-400":i===2?"bg-amber-600":"bg-gray-300"}`}
                          style={{ width:`${r.hit_rate*100}%` }} />
                      </div>
                      <span className="mono text-xs sm:text-sm font-bold text-gray-900 w-10 sm:w-12 text-right">
                        {(r.hit_rate*100).toFixed(0)}%
                      </span>
                    </div>
                  </div>
                </div>
              ))}
            </div>
            {yc && (
              <div className="bg-gray-50 rounded-lg p-3 border border-gray-200">
                <div className="text-xs text-gray-600 mb-2">
                  📅 전일({yc.date}) 실제 결과: <span className={yc.actual_movement==="UP"?"text-green-600":yc.actual_movement==="DOWN"?"text-red-600":"text-amber-600"}>
                    {yc.actual_movement==="UP"?"📈 상승":yc.actual_movement==="DOWN"?"📉 하락":"↔️ 횡보"}
                  </span>
                </div>
                <div className="flex flex-wrap gap-1.5 sm:gap-2">
                  {(yc.predictions || []).map((p, i) => (
                    <div key={i} className={`flex items-center gap-1 px-1.5 sm:px-2 py-1 rounded-lg text-[10px] sm:text-xs
                      ${p.was_correct?"bg-green-100 border border-green-200 text-green-700":"bg-red-100 border border-red-200 text-red-700"}`}>
                      <span>{p.avatar}</span>
                      <span className="hidden sm:inline">{p.agent}</span>
                      <span className={stanceColor[p.prediction]}>{p.prediction}</span>
                      <span>{p.was_correct?"✓":"✗"}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    function Footer({ date, moderatorAgent }) {
      return (
        <div className="text-center py-6 sm:py-8 text-xs text-gray-500">
          <div className="mb-1">🇺🇸 US Market Agent — Quintet Multi-Agent Debate System</div>
          <div>오늘의 Moderator: <span className="text-gray-400">{moderatorAgent}</span> | {date}</div>
          <div className="mt-1">⚠️ 본 보고서는 AI 생성 정보이며 투자 결정의 최종 책임은 투자자 본인에게 있습니다.</div>
        </div>
      );
    }

    // ─── 메인 앱 ─────────────────────────────────────
    function App() {
      const [report, setReport] = useState(null);
      const [loading, setLoading] = useState(true);
      const [usingSample, setUsingSample] = useState(false);

      useEffect(() => {
        async function loadData() {
          const t = Date.now();
          // 1차: daily_report.json
          try {
            const res = await fetch(`./data/daily_report.json?t=${t}`);
            if (res.ok) {
              const data = await res.json();
              if (data && data.date) { setReport(data); setLoading(false); return; }
            }
          } catch (_) {}

          // 2차: history 폴백 (최근 7일)
          const today = new Date();
          for (let i = 0; i < 7; i++) {
            const d = new Date(today);
            d.setDate(d.getDate() - i);
            const dateStr = d.toISOString().slice(0, 10);
            try {
              const res = await fetch(`../data/history/${dateStr}.json?t=${t}`);
              if (res.ok) {
                const data = await res.json();
                if (data && data.date) { setReport(data); setLoading(false); return; }
              }
            } catch (_) {}
          }

          // 폴백: 샘플
          setReport(SAMPLE);
          setUsingSample(true);
          setLoading(false);
        }
        loadData();
      }, []);

      if (loading) return (
        <div className="flex items-center justify-center h-screen bg-white">
          <div className="text-center">
            <div className="text-5xl mb-4 pulse-slow">🇺🇸</div>
            <div className="text-gray-700 font-semibold">US Market Agent 데이터 로딩 중...</div>
          </div>
        </div>
      );

      const { date, generated_at, market_data: md, debate, verdict, backtest } = report;

      return (
        <div className="min-h-screen bg-white">
          <Header date={date} generatedAt={generated_at} />
          {usingSample && (
            <div className="bg-amber-50 border-b border-amber-200 px-4 sm:px-6 py-2 text-xs text-amber-800 text-center">
              ⚠️ 샘플 데이터 표시 중 — GitHub Actions 자동화 후 실제 데이터로 업데이트됩니다
            </div>
          )}

          {/* Index Bar */}
          <IndexBar data={md || {}} />

          <div className="max-w-6xl mx-auto px-3 sm:px-4 py-4 sm:py-6">
            {/* 투자 판단 Weather Card */}
            <WeatherCard verdict={verdict} />

            {/* Key Insights / Risks / Actions */}
            <VerdictDetails verdict={verdict} />

            {/* 기술적 지표 */}
            <TechnicalIndicators ti={md?.technical_indicators} />

            {/* Fed Watch */}
            <FedWatch fedWatch={md?.fed_watch} />

            {/* 2-column 레이아웃 */}
            <div className="grid md:grid-cols-2 gap-4 sm:gap-6 mb-0">
              {/* 왼쪽: Agent Stances + Rates */}
              <div>
                <AgentStanceCards reports={debate?.phase1_reports} />
                <RatesEarnings rates={md?.rates} earnings={md?.earnings} valuation={md?.valuation} />
                <BacktestLeaderboard backtest={backtest} />
              </div>
              {/* 오른쪽: Sector Heatmap */}
              <div>
                <SectorHeatmap sectors={md?.sectors} topSectors={verdict?.top_sectors} topStocks={md?.top_stocks} />
              </div>
            </div>

            {/* 토론 타임라인 */}
            <DebateTimeline reports={debate?.phase1_reports} critiques={debate?.phase2_critiques} />

            <Footer date={date} moderatorAgent={verdict?.today_moderator_agent} />
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
